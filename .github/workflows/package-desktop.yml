name: Package desktop assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to upload assets to
        required: true
        default: v0.1.1

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            package_script: package-win
            asset_glob: dist/*.exe
            checksum_ext: .exe
          - platform: linux
            runner: ubuntu-latest
            package_script: package-linux
            asset_glob: dist/*.AppImage
            checksum_ext: .AppImage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: npm test

      - name: Package ${{ matrix.platform }}
        run: npm run ${{ matrix.package_script }}

      - name: Create checksum
        shell: bash
        run: |
          cd dist
          node -e "const fs=require('fs');const crypto=require('crypto');const ext='${{ matrix.checksum_ext }}';const files=fs.readdirSync('.').filter((name)=>name.endsWith(ext)).sort();if(!files.length){throw new Error('No assets matched checksum extension '+ext)};const lines=files.map((name)=>crypto.createHash('sha256').update(fs.readFileSync(name)).digest('hex')+'  '+name);fs.writeFileSync('SHA256SUMS-${{ matrix.platform }}.txt',lines.join('\n')+'\n');"
          cat SHA256SUMS-${{ matrix.platform }}.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hns-investments-${{ matrix.platform }}-${{ github.event.inputs.release_tag }}
          path: |
            ${{ matrix.asset_glob }}
            dist/SHA256SUMS-${{ matrix.platform }}.txt
          if-no-files-found: error

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          gh release upload "$RELEASE_TAG" ${{ matrix.asset_glob }} dist/SHA256SUMS-${{ matrix.platform }}.txt --clobber
